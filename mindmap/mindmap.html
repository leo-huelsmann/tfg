<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mindmap - toolsforgestalters</title>
  <link rel="stylesheet" href="../css/style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.29.2/cytoscape.min.js"></script>
  <style>
    body {
      display: flex;
      flex-direction: column;
      height: 100vh;
      width: 100vw;
      margin: 0;
      padding: 0;
      background-color: #f5f5f5;
      font-family: 'GT-America-Mono', monospace;
      overflow: hidden;
      text-transform: lowercase;
    }

    /* Absolute header positioning to float above the canvas */
    .header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 24px;
      z-index: 10;
      pointer-events: none;
    }

    .header-titles {
      display: flex;
      flex-direction: column;
      pointer-events: auto;
    }

    .toolbar-container {
      display: flex;
      align-items: center;
      gap: 10px;
      pointer-events: auto;
    }

    .formula-input {
      background: #ffffff;
      border: 1px solid #0052CC;
      color: #0052CC;
      font-family: 'GT-America-Mono', monospace;
      font-size: 14px;
      font-weight: 500;
      padding: 6px 12px;
      border-radius: 50px;
      box-sizing: border-box;
      outline: none;
      transition: border-color 0.2s, color 0.2s;
      width: 180px;
      height: 32px;
    }

    .formula-input:focus {
      border-color: #ff0059;
      color: #ff0059;
    }

    /* Cytoscape Container */
    #cy {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #f5f5f5;
      z-index: 1;
    }

    /* Status and Info text at bottom right */
    .bottom-right-info {
      position: fixed;
      bottom: 30px;
      right: 30px;
      font-size: clamp(10px, 0.65vw, 14px);
      color: #555;
      font-family: 'GT-America-Mono', monospace;
      pointer-events: none;
      z-index: 10;
      max-width: 300px;
      text-align: right;
      text-transform: uppercase;
      line-height: 1.5;
    }
    
    #status {
      margin-bottom: 8px;
      color: #555;
    }

    /* Popup menu style */
    #popup {
      display: none;
      position: fixed;
      background: #ffffff;
      border: 1px solid #0052CC;
      padding: 12px;
      z-index: 100;
      min-width: 180px;
      border-radius: 4px;
      box-shadow: 0 4px 15px rgba(0, 82, 204, 0.15);
      font-family: 'GT-America-Mono', monospace;
      text-transform: lowercase;
    }

    #popup strong {
      display: block;
      margin-bottom: 8px;
      font-size: 13px;
      color: #000;
      border-bottom: 1px dashed #0052CC;
      padding-bottom: 4px;
    }

    #popup button {
      display: block;
      width: 100%;
      text-align: left;
      background: none;
      border: none;
      padding: 6px 8px;
      cursor: pointer;
      font-family: 'GT-America-Mono', monospace;
      font-size: 12px;
      color: #0052CC;
      transition: background-color 0.2s, color 0.2s;
      border-radius: 2px;
    }

    #popup button:hover {
      background-color: #f2ff00;
      color: #000;
    }

    /* Key Hints */
    .key-hints {
      z-index: 10;
    }
  </style>
</head>

<body>

  <div class="header">
    <div class="header-titles">
      <a href="../html/index.html" class="header-back-link"><h1>← tools für gestalter:innen</h1></a>
      <h1>wort-mindmap</h1>
    </div>
    
    <div class="toolbar-container">
      <button id="undoBtn" class="info-btn" disabled>rückgängig</button>
      <button id="resetBtn" class="info-btn btn-red" style="display: none;">reset</button>
    </div>
  </div>

  <div id="start-overlay" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); display: flex; flex-direction: column; align-items: center; gap: 15px; z-index: 20;">
    <input type="text" id="wordInput" class="formula-input" placeholder="wort eingeben..." autofocus style="width: 220px; text-align: center; height: 40px; font-size: 16px;" />
    <button id="startBtn" class="info-btn" style="width: 220px; padding: 10px; text-transform: uppercase;">wort hinzufügen</button>
  </div>

  <div id="cy"></div>

  <div class="bottom-right-info">
    <div id="status"></div>
    <div class="dict-info">Datenbasis: OpenThesaurus & Wiktionary<br>Sprache: Deutsch</div>
  </div>

  <div id="popup">
    <strong id="popupWord"></strong>
    <button id="btnSyn">synonyme laden</button>
    <button id="btnHypo">unterbegriffe laden</button>
    <button id="btnHyper">oberbegriffe laden</button>
    <button id="btnClose">schließen</button>
  </div>

  <!-- Key Hints am Fuß -->
  <div class="key-hints">
    <div class="key-hint">esc</div>
  </div>

  <script>
    const OPENTHESAURUS_URL = "https://www.openthesaurus.de/synonyme/search";
    const WIKTIONARY_API = "https://de.wiktionary.org/w/api.php";
    const MAX_PER_TYPE = 6;

    async function getSynonyms(word) {
      try {
        const res = await fetch(`${OPENTHESAURUS_URL}?q=${encodeURIComponent(word)}&format=application/json&similar=true`);
        const data = await res.json();
        const synonyms = [];
        if (data.synsets) {
          for (const synset of data.synsets) {
            if (synset.terms) {
              for (const term of synset.terms) {
                const w = term.term.trim();
                if (w && w.toLowerCase() !== word.toLowerCase() && !synonyms.includes(w)) {
                  synonyms.push(w);
                }
              }
            }
          }
        }
        return synonyms.slice(0, MAX_PER_TYPE);
      } catch (e) {
        console.error("OpenThesaurus Error:", e);
        return [];
      }
    }

    async function getWiktionaryRelations(word) {
      try {
        const res = await fetch(`${WIKTIONARY_API}?action=query&titles=${encodeURIComponent(word)}&prop=revisions&rvprop=content&format=json&formatversion=2&origin=*`);
        const data = await res.json();
        const pages = data?.query?.pages || [];
        if (!pages.length) return { hypernyms: [], hyponyms: [] };
        const content = pages[0]?.revisions?.[0]?.content || "";
        return parseWikitextRelations(content);
      } catch (e) {
        console.error("Wiktionary Error:", e);
        return { hypernyms: [], hyponyms: [] };
      }
    }

    function parseWikitextRelations(text) {
      const result = { hypernyms: [], hyponyms: [] };
      const sectionMap = { "Oberbegriffe": "hypernyms", "Unterbegriffe": "hyponyms" };
      let currentSection = null;

      const lines = text.split('\n');
      for (const line of lines) {
        const stripped = line.trim();
        let foundSection = false;
        
        for (const [name, key] of Object.entries(sectionMap)) {
          const regex = new RegExp(`\\{\\{${name}\\}\\}`);
          if (regex.test(stripped)) {
            currentSection = key;
            foundSection = true;
            break;
          }
        }

        if (!foundSection && currentSection) {
          if (stripped.startsWith("==") || (stripped.startsWith("{{") && !Object.keys(sectionMap).some(n => stripped.includes(n)))) {
            currentSection = null;
          }
        }

        if (currentSection) {
          const regex = /\[\[([^\]|#\n]+?)(?:\|[^\]]*)?\]\]/g;
          let match;
          while ((match = regex.exec(line)) !== null) {
            let link = match[1].trim();
            if (link && !link.includes(':') && !result[currentSection].includes(link)) {
              result[currentSection].push(link);
            }
          }
        }
      }
      return result;
    }

    // ─── Cytoscape ────────────────────────────────────────────────────────────────
    const cy = cytoscape({
      container: document.getElementById("cy"),
      style: [
        {
          selector: "node",
          style: {
            label: "data(label)",
            "text-valign": "center",
            "text-halign": "center",
            "font-family": "GT-America-Mono, monospace",
            "font-size": "12px",
            "background-color": "#ffffff",
            color: "#0052CC",
            "border-width": 1,
            "border-color": "#0052CC",
            shape: "round-rectangle",
            width: "label",
            height: "label",
            padding: "10px",
            "text-wrap": "wrap",
            "text-max-width": "120px",
          },
        },
        {
          selector: "node[type = 'root']",
          style: {
            "background-color": "#f2ff00",
            color: "#000000",
            "font-weight": "bold",
          },
        },
        {
          selector: "edge",
          style: {
            width: 1.5,
            "line-color": "#0052CC",
            "curve-style": "bezier",
            "font-family": "GT-America-Mono, monospace",
            "font-size": "9px",
            color: "#0052CC",
            label: "data(relation)",
            "text-background-opacity": 1,
            "text-background-color": "#f5f5f5",
            "text-background-padding": "3px",
            "target-arrow-color": "#0052CC",
            "source-arrow-color": "#0052CC",
          },
        },
        {
          selector: "edge[relation = 'Syn']",
          style: {
            "line-style": "dashed",
            "target-arrow-shape": "none",
            "source-arrow-shape": "none",
          },
        },
        {
          selector: "edge[relation = 'Ober']",
          style: {
            "line-style": "solid",
            "target-arrow-shape": "none",
            "source-arrow-shape": "triangle",
          },
        },
        {
          selector: "edge[relation = 'Unter']",
          style: {
            "line-style": "solid",
            "target-arrow-shape": "triangle",
            "source-arrow-shape": "none",
          },
        },
      ],
      layout: { name: "preset" },
      wheelSensitivity: 0.3,
    });

    // ─── Zustand ──────────────────────────────────────────────────────────────────
    let activeNode = null;
    const undoStack = [];

    function setStatus(msg) {
      document.getElementById("status").textContent = msg;
    }

    function updateUndoBtn() {
      document.getElementById("undoBtn").disabled = undoStack.length === 0;
    }

    // ─── Graph-Operationen ────────────────────────────────────────────────────────
    function addNode(id, label, type, parentId, addedIds) {
      if (!cy.getElementById(id).length) {
        const parent = cy.getElementById(parentId);
        const px = parent.length ? parent.position("x") : cy.width() / 2;
        const py = parent.length ? parent.position("y") : cy.height() / 2;
        const angle = Math.random() * 2 * Math.PI;
        const dist = 140 + Math.random() * 50;

        cy.add({
          group: "nodes",
          data: { id, label, type },
          position: {
            x: px + Math.cos(angle) * dist,
            y: py + Math.sin(angle) * dist,
          },
        });
        addedIds.push(id);
      }

      const edgeId = `${parentId}→${id}`;
      if (!cy.getElementById(edgeId).length) {
        const relation = type === "synonym" ? "Syn"
          : type === "hyponym" ? "Unter"
            : type === "hypernym" ? "Ober"
              : "";
        cy.add({
          group: "edges",
          data: { id: edgeId, source: parentId, target: id, relation },
        });
        addedIds.push(edgeId);
      }
    }

    async function expand(nodeId, word, type) {
      setStatus(`lade „${word}“...`);
      try {
        const addedIds = [];
        const add = (words, relType) => {
          words.forEach(w => {
            const childId = `${relType}:${w}:from:${nodeId}`;
            addNode(childId, w, relType, nodeId, addedIds);
          });
        };

        if (type === "synonym" || type === "all") {
          const syns = await getSynonyms(word);
          add(syns, "synonym");
        }
        
        if (type === "hyponym" || type === "hypernym" || type === "all") {
          const wiki = await getWiktionaryRelations(word);
          if (type === "hyponym" || type === "all") add(wiki.hyponyms.slice(0, MAX_PER_TYPE), "hyponym");
          if (type === "hypernym" || type === "all") add(wiki.hypernyms.slice(0, MAX_PER_TYPE), "hypernym");
        }

        if (addedIds.length > 0) {
          undoStack.push(addedIds);
          updateUndoBtn();
          setStatus(`${addedIds.filter(id => !id.includes("→")).length} neue begriffe hinzugefügt.`);
        } else {
          setStatus("keine weiteren begriffe gefunden.");
        }
      } catch (e) {
        setStatus(`fehler: ${e.message}`);
        console.error(e);
      }
    }

    // ─── Undo ─────────────────────────────────────────────────────────────────────
    document.getElementById("undoBtn").addEventListener("click", () => {
      if (undoStack.length === 0) return;
      const ids = undoStack.pop();
      ids.forEach(id => {
        const el = cy.getElementById(id);
        if (el.length) cy.remove(el);
      });
      updateUndoBtn();
      setStatus("schritt rückgängig gemacht.");
    });

    // ─── Start / Reset ────────────────────────────────────────────────────────────
    function startWithWord(word) {
      cy.elements().remove();
      undoStack.length = 0;
      updateUndoBtn();
      
      // Hide overlay, show reset button
      document.getElementById("start-overlay").style.display = "none";
      document.getElementById("resetBtn").style.display = "block";

      const rootId = `root:${word}`;
      cy.add({
        group: "nodes",
        data: { id: rootId, label: word, type: "root" },
        position: { x: cy.width() / 2, y: cy.height() / 2 },
      });
      setStatus(`„${word}“ – knoten anklicken zum expandieren.`);
    }

    document.getElementById("startBtn").addEventListener("click", () => {
      const word = document.getElementById("wordInput").value.trim();
      if (word) startWithWord(word);
    });

    document.getElementById("wordInput").addEventListener("keydown", e => {
      if (e.key === "Enter") document.getElementById("startBtn").click();
    });

    document.getElementById("resetBtn").addEventListener("click", () => {
      cy.elements().remove();
      undoStack.length = 0;
      updateUndoBtn();
      
      // Show overlay, hide reset button
      document.getElementById("start-overlay").style.display = "flex";
      document.getElementById("resetBtn").style.display = "none";
      
      document.getElementById("wordInput").value = "";
      document.getElementById("wordInput").focus();
      setStatus("");
      hidePopup();
    });

    // ─── Popup ────────────────────────────────────────────────────────────────────
    const popup = document.getElementById("popup");

    function showPopup(node, x, y) {
      activeNode = node;
      document.getElementById("popupWord").textContent = node.data("label");
      popup.style.left = x + "px";
      popup.style.top = y + "px";
      popup.style.display = "block";
    }

    function hidePopup() {
      popup.style.display = "none";
      activeNode = null;
    }

    cy.on("tap", "node", evt => {
      const node = evt.target;
      const pos = evt.renderedPosition;
      showPopup(node, pos.x + 10, pos.y + 10);
    });

    cy.on("tap", evt => {
      if (evt.target === cy) hidePopup();
    });

    document.getElementById("btnSyn").addEventListener("click", () => {
      if (!activeNode) return;
      expand(activeNode.id(), activeNode.data("label"), "synonym");
      hidePopup();
    });

    document.getElementById("btnHypo").addEventListener("click", () => {
      if (!activeNode) return;
      expand(activeNode.id(), activeNode.data("label"), "hyponym");
      hidePopup();
    });

    document.getElementById("btnHyper").addEventListener("click", () => {
      if (!activeNode) return;
      expand(activeNode.id(), activeNode.data("label"), "hypernym");
      hidePopup();
    });

    document.getElementById("btnClose").addEventListener("click", hidePopup);

    // Escape-Taste bringt zurück zur Hauptseite
    document.addEventListener('keyup', function (e) {
      if (e.key === 'Escape' || e.key === 'Esc' || e.keyCode === 27) {
        window.location.href = '../html/index.html';
      }
    });
  </script>
</body>

</html>
