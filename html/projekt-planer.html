<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projekt-Planer - toolsforgestalters</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    body {
      display: flex;
      flex-direction: column;
      height: 100vh;
      width: 100vw;
      margin: 0;
      padding: 0;
      background-color: #f5f5f5;
      font-family: 'GT-America-Mono', monospace;
      overflow: hidden;
    }

    .main-container {
      display: flex;
      flex: 1;
      width: 100%;
      height: calc(100vh - 80px);
      /* Adjust for header */
      margin-top: 80px;
      padding: 20px 40px 80px 40px;
      /* Offset at bottom for key hints */
      gap: 40px;
      overflow: hidden;
    }

    /* Left panel: Controls & Phase editor */
    .controls-panel {
      width: 380px;
      min-width: 320px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      overflow-y: auto;
      padding-right: 15px;
      border-right: 1px solid rgba(0, 0, 0, 0.08);
    }

    /* Right panel: Timeline visualizer */
    .timeline-panel {
      flex: 1;
      height: 100%;
      overflow-y: auto;
      padding-right: 10px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    /* Inputs styling consistent with site guidelines */
    .input-field {
      width: 100%;
      border: none;
      border-bottom: 2px dashed #0052CC;
      background: transparent;
      padding: 8px 0;
      font-family: 'GT-America-Mono', monospace;
      font-size: 15px;
      color: #000000;
      outline: none;
    }

    .input-field:focus {
      border-bottom-style: solid;
      border-bottom-color: #ff0059;
    }

    .date-row {
      display: flex;
      gap: 16px;
    }

    .date-col {
      flex: 1;
    }

    /* Phase editor card */
    .phase-card {
      border: 1px solid #d2d2d2;
      background-color: #ffffff;
      padding: 16px;
      border-radius: 4px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.02);
      position: relative;
    }

    .phase-card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }

    .btn-delete-phase {
      background: none;
      border: none;
      color: #FF3B30;
      cursor: pointer;
      font-family: 'GT-America-Mono', monospace;
      font-size: 11px;
      text-transform: uppercase;
      padding: 2px 6px;
    }

    .btn-delete-phase:hover {
      text-decoration: underline;
    }

    .slider-row {
      display: flex;
      flex-direction: column;
      gap: 4px;
      font-size: 11px;
      color: #666;
    }

    .slider-row div {
      display: flex;
      justify-content: space-between;
    }

    .slider-control {
      width: 100%;
      accent-color: #0052CC;
      cursor: pointer;
    }

    /* Color circles in phase card */
    .color-picker-row {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .color-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 1px solid rgba(0, 0, 0, 0.15);
      cursor: pointer;
      padding: 0;
      box-sizing: border-box;
    }

    .color-dot.active {
      border: 2px solid #000;
      transform: scale(1.15);
    }

    /* Timeline graphics */
    .timeline-container {
      background-color: #ffffff;
      border: 1px solid #d2d2d2;
      border-radius: 4px;
      padding: 30px;
      position: relative;
      min-height: 350px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.03);
      overflow: hidden;
    }

    .timeline-header-info {
      margin-bottom: 24px;
      border-bottom: 2px solid #000;
      padding-bottom: 15px;
    }

    .timeline-header-info h2 {
      margin: 0 0 6px 0;
      font-size: clamp(20px, 2.0vw, 32px);
      font-weight: bold;
      color: #000;
      text-transform: uppercase;
    }

    .timeline-header-info span {
      font-size: 13px;
      color: #666;
    }

    /* The grid and scale */
    .timeline-grid {
      position: relative;
      width: 100%;
      margin-top: 20px;
    }

    .timeline-scale {
      display: flex;
      justify-content: space-between;
      border-bottom: 1px solid #000;
      padding-bottom: 8px;
      font-size: 10px;
      color: #777;
      margin-bottom: 16px;
    }

    /* Gantt rows */
    .gantt-rows {
      display: flex;
      flex-direction: column;
      gap: 14px;
      position: relative;
    }

    .gantt-row {
      position: relative;
      height: 36px;
      width: 100%;
      display: flex;
      align-items: center;
    }

    .gantt-bar {
      position: absolute;
      height: 100%;
      border-radius: 3px;
      display: flex;
      align-items: center;
      padding: 0 12px;
      font-size: 11px;
      font-weight: bold;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.05);
      box-sizing: border-box;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: left 0.15s ease, width 0.15s ease;
    }

    /* Grid vertical guidelines */
    .grid-lines {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      display: flex;
      justify-content: space-between;
    }

    .grid-line {
      width: 1px;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.04);
      border-left: 1px dashed rgba(0, 0, 0, 0.08);
    }

    /* Scrollbars */
    .controls-panel::-webkit-scrollbar,
    .timeline-panel::-webkit-scrollbar {
      width: 6px;
    }

    .controls-panel::-webkit-scrollbar-track,
    .timeline-panel::-webkit-scrollbar-track {
      background: rgba(0, 0, 0, 0.05);
      border-radius: 10px;
    }

    .controls-panel::-webkit-scrollbar-thumb,
    .timeline-panel::-webkit-scrollbar-thumb {
      background: #0052CC;
      border-radius: 10px;
    }

    /* Responsive */
    @media (max-width: 950px) {
      .main-container {
        flex-direction: column;
        overflow-y: auto;
        height: auto;
        padding-bottom: 100px;
      }

      .controls-panel {
        width: 100%;
        border-right: none;
        border-bottom: 1px solid rgba(0, 0, 0, 0.08);
        padding-bottom: 24px;
        overflow-y: visible;
      }

      .timeline-panel {
        overflow-y: visible;
      }
    }

    /* Print styles to generate clean PDF specimens */
    @media print {
      body {
        background-color: #ffffff !important;
        overflow: visible !important;
        height: auto !important;
      }
      .header, .key-hints, .controls-panel {
        display: none !important;
      }
      .main-container {
        margin: 0 !important;
        padding: 0 !important;
        height: auto !important;
        overflow: visible !important;
      }
      .timeline-panel {
        overflow: visible !important;
        height: auto !important;
        padding: 0 !important;
      }
      .timeline-container {
        border: none !important;
        box-shadow: none !important;
        padding: 0 !important;
        width: 100% !important;
        max-width: 100% !important;
      }
    }
  </style>
</head>

<body>

  <div class="header">
    <div class="header-titles">
      <a href="index.html" class="header-back-link">
        <h1>← tools für gestalter:innen</h1>
      </a>
      <h1>Projekt-Planer</h1>
    </div>
  </div>

  <div class="main-container">
    <!-- LEFT PANEL: CONTROLS -->
    <div class="controls-panel">
      <!-- Project Meta -->
      <div>
        <label
          style="font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: #777; font-weight: bold;">Projektname</label>
        <input type="text" id="project-name-input" class="input-field" value="Mein Semesterprojekt"
          placeholder="Projektname eingeben..." />
      </div>

      <div class="date-row">
        <div class="date-col">
          <label
            style="font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: #777; font-weight: bold;">Startdatum</label>
          <input type="date" id="project-start-input" class="input-field" />
        </div>
        <div class="date-col">
          <label
            style="font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: #777; font-weight: bold;">Enddatum</label>
          <input type="date" id="project-end-input" class="input-field" />
        </div>
      </div>

      <div>
        <button type="button" class="info-btn" id="btn-add-phase" style="width: 100%; text-transform: uppercase;">Neue
          Phase Hinzufügen</button>
      </div>

      <div>
        <button type="button" class="info-btn" id="btn-print" style="width: 100%; text-transform: uppercase;">PDF herunterladen / Drucken ↗</button>
      </div>

      <!-- Phases Editor list -->
      <div
        style="font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: #777; font-weight: bold; margin-bottom: -10px;">
        Projektphasen</div>
      <div id="phases-editor-list" style="display: flex; flex-direction: column; gap: 16px;">
        <!-- Filled dynamically -->
      </div>
    </div>

    <!-- RIGHT PANEL: TIMELINE -->
    <div class="timeline-panel">
      <div class="timeline-container">
        <!-- HEADER -->
        <div class="timeline-header-info">
          <h2 id="timeline-project-title">Mein Semesterprojekt</h2>
          <span id="timeline-duration-info">10. Juli 2026 - 10. August 2026 (31 Tage)</span>
        </div>

        <!-- GANTT SCALE & BARS -->
        <div class="timeline-grid">
          <!-- Scale labels -->
          <div class="timeline-scale" id="timeline-scale">
            <!-- Filled dynamically -->
          </div>

          <!-- Guidelines -->
          <div class="grid-lines" id="grid-guidelines">
            <!-- Filled dynamically -->
          </div>

          <!-- Rows -->
          <div class="gantt-rows" id="gantt-rows">
            <!-- Filled dynamically -->
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="key-hints">
    <div class="key-hint">esc</div>
  </div>

  <script>
    // Initial data setup
    const defaultColors = [
      { hex: '#0052CC', label: 'Blau' },
      { hex: '#FF3B30', label: 'Rot' },
      { hex: '#F2FF00', label: 'Gelb' },
      { hex: '#00FFCC', label: 'Türkis' }
    ];

    let phases = [
      { id: 1, name: "Recherche & Konzept", startDay: 0, durationDays: 7, color: '#0052CC' },
      { id: 2, name: "Entwurf & Gestaltung", startDay: 7, durationDays: 14, color: '#FF3B30' },
      { id: 3, name: "Reinzeichnung & Satz", startDay: 21, durationDays: 7, color: '#F2FF00' },
      { id: 4, name: "Druck & Produktion", startDay: 28, durationDays: 3, color: '#00FFCC' }
    ];

    // Inputs selectors
    const projectNameInput = document.getElementById('project-name-input');
    const startInput = document.getElementById('project-start-input');
    const endInput = document.getElementById('project-end-input');
    const btnAddPhase = document.getElementById('btn-add-phase');
    const btnPrint = document.getElementById('btn-print');
    const phasesEditorList = document.getElementById('phases-editor-list');

    const timelineProjectTitle = document.getElementById('timeline-project-title');
    const timelineDurationInfo = document.getElementById('timeline-duration-info');
    const timelineScale = document.getElementById('timeline-scale');
    const gridGuidelines = document.getElementById('grid-guidelines');
    const ganttRows = document.getElementById('gantt-rows');

    // Date init (Set start to today, end to 31 days later)
    const today = new Date();
    const futureDate = new Date();
    futureDate.setDate(today.getDate() + 31);

    startInput.value = today.toISOString().split('T')[0];
    endInput.value = futureDate.toISOString().split('T')[0];

    // Calculate total days
    function getProjectDays() {
      const s = new Date(startInput.value);
      const e = new Date(endInput.value);
      if (isNaN(s) || isNaN(e) || e < s) return 30; // fallback
      const diffTime = Math.abs(e - s);
      return Math.max(1, Math.ceil(diffTime / (1000 * 60 * 60 * 24)));
    }

    // Helper: contrast coloring for text inside bar
    function getContrastColor(hex) {
      // standard YIQ brightness formula
      const r = parseInt(hex.substring(1, 3), 16);
      const g = parseInt(hex.substring(3, 5), 16);
      const b = parseInt(hex.substring(5, 7), 16);
      const yiq = ((r * 299) + (g * 587) + (b * 114)) / 1000;
      return (yiq >= 150) ? '#000000' : '#ffffff';
    }

    // Formatter for dates
    function formatDateString(dateObj) {
      return dateObj.toLocaleDateString('de-DE', { day: '2-digit', month: 'short', year: 'numeric' });
    }

    // Draw the scale dates & vertical guideline grids
    function drawGrid(totalDays) {
      const start = new Date(startInput.value);
      const end = new Date(endInput.value);

      timelineProjectTitle.textContent = projectNameInput.value || "Unbenanntes Projekt";
      timelineDurationInfo.textContent = `${formatDateString(start)} - ${formatDateString(end)} (${totalDays} Tage)`;

      // Draw scale dates (Start, Mid, End)
      timelineScale.innerHTML = '';
      const scaleDates = [start, new Date(start.getTime() + (end - start) / 2), end];
      scaleDates.forEach(d => {
        const span = document.createElement('span');
        span.textContent = formatDateString(d);
        timelineScale.appendChild(span);
      });

      // Draw 5 dashed guidelines
      gridGuidelines.innerHTML = '';
      for (let i = 0; i < 5; i++) {
        const div = document.createElement('div');
        div.className = 'grid-line';
        gridGuidelines.appendChild(div);
      }
    }

    // Render visual Gantt bars
    function renderTimeline(totalDays) {
      ganttRows.innerHTML = '';

      if (phases.length === 0) {
        ganttRows.innerHTML = `<div style="text-align: center; color: #999; font-size: 12px; margin-top: 30px;">Keine Phasen eingetragen. Klicke links auf "Neue Phase hinzufügen".</div>`;
        return;
      }

      phases.forEach(p => {
        const row = document.createElement('div');
        row.className = 'gantt-row';

        const bar = document.createElement('div');
        bar.className = 'gantt-bar';
        bar.style.backgroundColor = p.color;
        bar.style.color = getContrastColor(p.color);

        // Position and width percentage calculation
        const leftPct = (p.startDay / totalDays) * 100;
        const widthPct = (p.durationDays / totalDays) * 100;

        bar.style.left = `${Math.min(99, leftPct)}%`;
        bar.style.width = `${widthPct}%`;

        // Tooltip detail or duration description
        const labelText = p.name ? `${p.name} (${p.durationDays} T)` : `Phase (${p.durationDays} T)`;
        bar.textContent = labelText;
        bar.title = labelText;

        row.appendChild(bar);
        ganttRows.appendChild(row);
      });
    }

    // Render inputs lists on the left panel
    function renderPhasesEditor(totalDays) {
      phasesEditorList.innerHTML = '';

      phases.forEach((p, idx) => {
        const card = document.createElement('div');
        card.className = 'phase-card';

        // Header Row with title and delete button
        const cardHeader = document.createElement('div');
        cardHeader.className = 'phase-card-header';

        const nameInput = document.createElement('input');
        nameInput.type = 'text';
        nameInput.className = 'input-field';
        nameInput.value = p.name;
        nameInput.style.fontSize = '13px';
        nameInput.style.padding = '4px 0';
        nameInput.addEventListener('input', (e) => {
          p.name = e.target.value;
          renderTimeline(totalDays);
        });

        const btnDelete = document.createElement('button');
        btnDelete.className = 'btn-delete-phase';
        btnDelete.textContent = 'Löschen';
        btnDelete.addEventListener('click', () => {
          phases = phases.filter(item => item.id !== p.id);
          updateAll();
        });

        cardHeader.appendChild(nameInput);
        cardHeader.appendChild(btnDelete);
        card.appendChild(cardHeader);

        // Sliders container
        const slidersContainer = document.createElement('div');
        slidersContainer.style.display = 'flex';
        slidersContainer.style.flexDirection = 'column';
        slidersContainer.style.gap = '10px';

        // 1. Start Day Slider
        const startSliderRow = document.createElement('div');
        startSliderRow.className = 'slider-row';

        const startLabels = document.createElement('div');
        startLabels.innerHTML = `<span>Start: Tag ${p.startDay}</span><span>Max: Tag ${totalDays - 1}</span>`;

        const startSlider = document.createElement('input');
        startSlider.type = 'range';
        startSlider.className = 'slider-control';
        startSlider.min = 0;
        startSlider.max = totalDays - 1;
        startSlider.value = p.startDay;
        startSlider.addEventListener('input', (e) => {
          const val = parseInt(e.target.value);
          p.startDay = val;
          startLabels.innerHTML = `<span>Start: Tag ${p.startDay}</span><span>Max: Tag ${totalDays - 1}</span>`;
          renderTimeline(totalDays);
        });

        startSliderRow.appendChild(startLabels);
        startSliderRow.appendChild(startSlider);
        slidersContainer.appendChild(startSliderRow);

        // 2. Duration Slider
        const durSliderRow = document.createElement('div');
        durSliderRow.className = 'slider-row';

        const maxDuration = totalDays;
        const durLabels = document.createElement('div');
        durLabels.innerHTML = `<span>Dauer: ${p.durationDays} Tage</span><span>Max: ${maxDuration} Tage</span>`;

        const durSlider = document.createElement('input');
        durSlider.type = 'range';
        durSlider.className = 'slider-control';
        durSlider.min = 1;
        durSlider.max = maxDuration;
        durSlider.value = p.durationDays;
        durSlider.addEventListener('input', (e) => {
          const val = parseInt(e.target.value);
          p.durationDays = val;
          durLabels.innerHTML = `<span>Dauer: ${p.durationDays} Tage</span><span>Max: ${maxDuration} Tage</span>`;
          renderTimeline(totalDays);
        });

        durSliderRow.appendChild(durLabels);
        durSliderRow.appendChild(durSlider);
        slidersContainer.appendChild(durSliderRow);

        card.appendChild(slidersContainer);

        // Color Dots Row
        const colorPickerRow = document.createElement('div');
        colorPickerRow.className = 'color-picker-row';

        defaultColors.forEach(c => {
          const dot = document.createElement('button');
          dot.type = 'button';
          dot.className = 'color-dot';
          dot.style.backgroundColor = c.hex;
          if (p.color === c.hex) dot.classList.add('active');
          dot.addEventListener('click', () => {
            p.color = c.hex;
            // Set active class on dot
            colorPickerRow.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
            dot.classList.add('active');
            renderTimeline(totalDays);
          });
          colorPickerRow.appendChild(dot);
        });

        card.appendChild(colorPickerRow);
        phasesEditorList.appendChild(card);
      });
    }

    // Master update function
    function updateAll() {
      const totalDays = getProjectDays();

      // Ensure startDay and duration do not break boundary for all phases
      phases.forEach(p => {
        if (p.startDay >= totalDays) p.startDay = totalDays - 1;
        if (p.startDay < 0) p.startDay = 0;
        if (p.durationDays > totalDays) p.durationDays = totalDays;
      });

      drawGrid(totalDays);
      renderTimeline(totalDays);
      renderPhasesEditor(totalDays);
    }

    // Add Phase Button Listener
    btnAddPhase.addEventListener('click', () => {
      const totalDays = getProjectDays();
      const lastPhase = phases[phases.length - 1];
      let newStart = 0;
      if (lastPhase) {
        newStart = lastPhase.startDay + lastPhase.durationDays;
        if (newStart >= totalDays) newStart = 0;
      }

      const newPhase = {
        id: Date.now(),
        name: `Phase ${phases.length + 1}`,
        startDay: newStart,
        durationDays: Math.max(1, Math.min(7, totalDays - newStart)),
        color: defaultColors[phases.length % defaultColors.length].hex
      };

      phases.push(newPhase);
      updateAll();
    });

    // Add listeners to Project Meta inputs
    projectNameInput.addEventListener('input', () => {
      timelineProjectTitle.textContent = projectNameInput.value || "Unbenanntes Projekt";
    });

    startInput.addEventListener('change', updateAll);
    endInput.addEventListener('change', updateAll);

    // Print/PDF Button listener
    btnPrint.addEventListener('click', () => {
      window.print();
    });

    // Escape redirects to landing page
    document.addEventListener('keyup', function (e) {
      if (e.key === 'Escape' || e.key === 'Esc' || e.keyCode === 27) {
        window.location.href = 'index.html';
      }
    });

    // Initialize layout
    document.addEventListener('DOMContentLoaded', () => {
      updateAll();
    });
  </script>
</body>

</html>
