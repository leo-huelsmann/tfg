<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Workload-Planer - toolsforgestalters</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    body {
      display: flex;
      flex-direction: column;
      height: 100vh;
      width: 100vw;
      margin: 0;
      padding: 0;
      background-color: #f5f5f5;
      font-family: 'GT-America-Mono', monospace;
      overflow: hidden;
    }

    .main-container {
      display: flex;
      flex: 1;
      width: 100%;
      height: calc(100vh - 80px); /* Adjust for header */
      margin-top: 80px;
      padding: 20px 40px 80px 40px; /* Offset at bottom for key hints */
      gap: 40px;
      overflow: hidden;
    }

    /* Left panel: Controls & list editor */
    .controls-panel {
      width: 380px;
      min-width: 320px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      overflow-y: auto;
      padding-right: 15px;
      border-right: 1px solid rgba(0, 0, 0, 0.08);
    }

    /* Right panel: Visualizer panel */
    .visualizer-panel {
      flex: 1;
      height: 100%;
      overflow-y: auto;
      padding-right: 10px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    /* Input elements consistent with guidelines */
    .input-field {
      width: 100%;
      border: none;
      border-bottom: 2px dashed #0052CC;
      background: transparent;
      padding: 8px 0;
      font-family: 'GT-America-Mono', monospace;
      font-size: 15px;
      color: #000000;
      outline: none;
    }

    .input-field:focus {
      border-bottom-style: solid;
      border-bottom-color: #ff0059;
    }

    /* Step card */
    .step-card {
      border: 1px solid #d2d2d2;
      background-color: #ffffff;
      padding: 16px;
      border-radius: 4px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.02);
      position: relative;
    }

    .step-card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }

    .btn-delete-step {
      background: none;
      border: none;
      color: #FF3B30;
      cursor: pointer;
      font-family: 'GT-America-Mono', monospace;
      font-size: 11px;
      text-transform: uppercase;
      padding: 2px 6px;
    }

    .btn-delete-step:hover {
      text-decoration: underline;
    }

    .slider-row {
      display: flex;
      flex-direction: column;
      gap: 4px;
      font-size: 11px;
      color: #666;
    }

    .slider-row div {
      display: flex;
      justify-content: space-between;
    }

    .slider-control {
      width: 100%;
      accent-color: #0052CC;
      cursor: pointer;
    }

    /* Visual stack graphics */
    .stack-container {
      background-color: #ffffff;
      border: 1px solid #d2d2d2;
      border-radius: 4px;
      padding: 40px;
      min-height: 400px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.03);
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .stack-header-info {
      border-bottom: 2px solid #000;
      padding-bottom: 15px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }

    .stack-header-info h2 {
      margin: 0;
      font-size: clamp(20px, 2.0vw, 32px);
      font-weight: bold;
      color: #000;
      text-transform: uppercase;
    }

    .stack-total-info {
      font-size: 14px;
      font-weight: bold;
      color: #0052CC;
    }

    .stack-total-info.warning {
      color: #FF3B30;
    }

    .stack-total-info.success {
      color: #34C759;
    }

    /* Graphical rectangles list */
    .stack-graphics {
      display: flex;
      flex-direction: column;
      gap: 16px;
      width: 100%;
      border-left: 2px solid #000;
      padding: 10px 0;
      position: relative;
    }

    .stack-bar {
      height: 48px;
      border-radius: 0 4px 4px 0;
      display: flex;
      align-items: center;
      padding: 0 16px;
      font-size: 13px;
      font-weight: bold;
      box-shadow: 2px 2px 8px rgba(0, 0, 0, 0.04);
      box-sizing: border-box;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: width 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    /* Custom scrollbars */
    .controls-panel::-webkit-scrollbar,
    .visualizer-panel::-webkit-scrollbar {
      width: 6px;
    }
    .controls-panel::-webkit-scrollbar-track,
    .visualizer-panel::-webkit-scrollbar-track {
      background: rgba(0, 0, 0, 0.05);
      border-radius: 10px;
    }
    .controls-panel::-webkit-scrollbar-thumb,
    .visualizer-panel::-webkit-scrollbar-thumb {
      background: #0052CC;
      border-radius: 10px;
    }

    /* Print styles to generate clean PDF specimens */
    @media print {
      body {
        background-color: #ffffff !important;
        overflow: visible !important;
        height: auto !important;
      }
      .header, .key-hints, .controls-panel {
        display: none !important;
      }
      .main-container {
        margin: 0 !important;
        padding: 0 !important;
        height: auto !important;
        overflow: visible !important;
      }
      .visualizer-panel {
        overflow: visible !important;
        height: auto !important;
        padding: 0 !important;
      }
      .stack-container {
        border: none !important;
        box-shadow: none !important;
        padding: 0 !important;
        width: 100% !important;
        max-width: 100% !important;
      }
    }

    /* Responsive */
    @media (max-width: 950px) {
      .main-container {
        flex-direction: column;
        overflow-y: auto;
        height: auto;
        padding-bottom: 100px;
      }
      .controls-panel {
        width: 100%;
        border-right: none;
        border-bottom: 1px solid rgba(0, 0, 0, 0.08);
        padding-bottom: 24px;
        overflow-y: visible;
      }
      .visualizer-panel {
        overflow-y: visible;
      }
    }
  </style>
</head>

<body>

  <div class="header">
    <div class="header-titles">
      <a href="index.html" class="header-back-link"><h1>← tools für gestalter:innen</h1></a>
      <h1>Workload-Planer</h1>
    </div>
  </div>

  <div class="main-container">
    <!-- LEFT PANEL: CONTROLS -->
    <div class="controls-panel">
      <!-- Info Header -->
      <div>
        <button type="button" class="info-btn" id="btn-add-step" style="width: 100%; text-transform: uppercase;">Arbeitsschritt Hinzufügen</button>
      </div>
      <div>
        <button type="button" class="info-btn" id="btn-print" style="width: 100%; text-transform: uppercase;">PDF herunterladen / Drucken ↗</button>
      </div>

      <!-- Editor list -->
      <div style="font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: #777; font-weight: bold; margin-bottom: -10px;">Arbeitsschritte</div>
      <div id="steps-editor-list" style="display: flex; flex-direction: column; gap: 16px;">
        <!-- Dynamically filled -->
      </div>
    </div>

    <!-- RIGHT PANEL: GRAPHICS STACK -->
    <div class="visualizer-panel">
      <div class="stack-container">
        <!-- HEADER -->
        <div class="stack-header-info">
          <h2>Arbeitspakete &amp; Workload</h2>
          <span id="stack-total-label" class="stack-total-info">Gesamtbelastung: 100%</span>
        </div>

        <!-- GRAPHICS -->
        <div class="stack-graphics" id="stack-graphics">
          <!-- Filled dynamically -->
        </div>
      </div>
    </div>
  </div>

  <div class="key-hints">
    <div class="key-hint">esc</div>
  </div>

  <script>
    // Theme Colors
    const colors = ['#0052CC', '#FF3B30', '#F2FF00', '#00FFCC'];

    // Default starting steps
    let steps = [
      { id: 1, name: "Konzept & Recherche", percentage: 40 },
      { id: 2, name: "Gestaltung & Layout", percentage: 30 },
      { id: 3, name: "Reinzeichnung & Satz", percentage: 20 },
      { id: 4, name: "Druck & Produktion", percentage: 10 }
    ];

    // Selectors
    const btnAddStep = document.getElementById('btn-add-step');
    const btnPrint = document.getElementById('btn-print');
    const stepsEditorList = document.getElementById('steps-editor-list');
    const stackTotalLabel = document.getElementById('stack-total-label');
    const stackGraphics = document.getElementById('stack-graphics');

    // Contrast text formula (YIQ)
    function getContrastColor(hex) {
      const r = parseInt(hex.substring(1, 3), 16);
      const g = parseInt(hex.substring(3, 5), 16);
      const b = parseInt(hex.substring(5, 7), 16);
      const yiq = ((r * 299) + (g * 587) + (b * 114)) / 1000;
      return (yiq >= 150) ? '#000000' : '#ffffff';
    }

    // Render step list inputs
    function renderEditor() {
      stepsEditorList.innerHTML = '';
      
      steps.forEach((s, index) => {
        const card = document.createElement('div');
        card.className = 'step-card';

        // Header (Name & Delete)
        const header = document.createElement('div');
        header.className = 'step-card-header';

        const nameInput = document.createElement('input');
        nameInput.type = 'text';
        nameInput.className = 'input-field';
        nameInput.value = s.name;
        nameInput.style.fontSize = '13px';
        nameInput.style.padding = '4px 0';
        nameInput.addEventListener('input', (e) => {
          s.name = e.target.value;
          updateVisualizer();
        });

        const btnDelete = document.createElement('button');
        btnDelete.className = 'btn-delete-step';
        btnDelete.textContent = 'Löschen';
        btnDelete.addEventListener('click', () => {
          steps = steps.filter(item => item.id !== s.id);
          updateAll();
        });

        header.appendChild(nameInput);
        header.appendChild(btnDelete);
        card.appendChild(header);

        // Percentage Slider
        const sliderRow = document.createElement('div');
        sliderRow.className = 'slider-row';

        const labels = document.createElement('div');
        labels.innerHTML = `<span>Arbeitsanteil:</span><span style="font-weight: bold; color: #0052CC;">${s.percentage}%</span>`;

        const slider = document.createElement('input');
        slider.type = 'range';
        slider.className = 'slider-control';
        slider.min = 0;
        slider.max = 100;
        slider.value = s.percentage;
        slider.addEventListener('input', (e) => {
          const val = parseInt(e.target.value);
          s.percentage = val;
          labels.innerHTML = `<span>Arbeitsanteil:</span><span style="font-weight: bold; color: #0052CC;">${s.percentage}%</span>`;
          updateVisualizer();
        });

        sliderRow.appendChild(labels);
        sliderRow.appendChild(slider);
        card.appendChild(sliderRow);

        stepsEditorList.appendChild(card);
      });
    }

    // Render sorted visual graphics
    function updateVisualizer() {
      // 1. Calculate sum and set status warning class
      const totalSum = steps.reduce((sum, s) => sum + s.percentage, 0);
      stackTotalLabel.textContent = `Gesamtbelastung: ${totalSum}%`;
      stackTotalLabel.className = 'stack-total-info';
      
      if (totalSum === 100) {
        stackTotalLabel.classList.add('success');
        stackTotalLabel.textContent += ' (Optimal 100%)';
      } else if (totalSum > 100) {
        stackTotalLabel.classList.add('warning');
        stackTotalLabel.textContent += ' (Überlastet > 100%)';
      } else {
        stackTotalLabel.classList.add('warning');
        stackTotalLabel.textContent += ' (Unvollständig < 100%)';
      }

      // 2. Sort steps by percentage descending
      const sortedSteps = [...steps].sort((a, b) => b.percentage - a.percentage);

      // 3. Render stacked rectangles
      stackGraphics.innerHTML = '';
      if (sortedSteps.length === 0) {
        stackGraphics.innerHTML = `<div style="text-align: center; color: #999; font-size: 12px; margin-top: 30px; border-left: none;">Keine Arbeitsschritte vorhanden. Klicke links auf "Arbeitsschritt hinzufügen".</div>`;
        return;
      }

      sortedSteps.forEach((s, idx) => {
        const bar = document.createElement('div');
        bar.className = 'stack-bar';
        
        // Auto-assign colors sequentially
        const color = colors[idx % colors.length];
        bar.style.backgroundColor = color;
        bar.style.color = getContrastColor(color);
        
        // Width proportional to percentage (min 1px to show zero bars cleanly if needed)
        bar.style.width = s.percentage > 0 ? `${s.percentage}%` : '1px';
        
        const labelText = s.name ? `${s.name} (${s.percentage}%)` : `Arbeitsschritt (${s.percentage}%)`;
        bar.textContent = labelText;
        bar.title = labelText;

        stackGraphics.appendChild(bar);
      });
    }

    // Master update
    function updateAll() {
      renderEditor();
      updateVisualizer();
    }

    // Add Step click
    btnAddStep.addEventListener('click', () => {
      const remaining = 100 - steps.reduce((sum, s) => sum + s.percentage, 0);
      const defaultPercent = Math.max(0, Math.min(10, remaining));
      
      const newStep = {
        id: Date.now(),
        name: `Arbeitsschritt ${steps.length + 1}`,
        percentage: defaultPercent
      };
      
      steps.push(newStep);
      updateAll();
    });

    // Print event
    btnPrint.addEventListener('click', () => {
      window.print();
    });

    // Escape returns to landing page
    document.addEventListener('keyup', function (e) {
      if (e.key === 'Escape' || e.key === 'Esc' || e.keyCode === 27) {
        window.location.href = 'index.html';
      }
    });

    // Initialize layout
    document.addEventListener('DOMContentLoaded', () => {
      updateAll();
    });
  </script>
</body>
</html>
