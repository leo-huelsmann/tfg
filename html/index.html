  <!-- Container für die Beschreibung unten rechts -->
  <div id="block-description" class="block-description"></div>

  <script>
    const blocks = document.querySelectorAll('.block');
    const totalBlocks = blocks.length;

    // Radien vergrößert, damit das Karussell insgesamt breiter und weitläufiger wirkt
    let radiusX = window.innerWidth * 0.38;
    let radiusY = window.innerHeight * 0.13;

    // Diagonale Neigung (-20 Grad)
    const tiltAngle = -20 * (Math.PI / 180);

    const savedAngle = sessionStorage.getItem('carouselAngle');
    let currentAngle = savedAngle !== null ? parseFloat(savedAngle) : 0;
    let targetAngle = currentAngle;
    let isSnapping = false;

    // --- BESCHREIBUNGEN DER UNTERSEITEN (BLINDTEXTE) ---
    const descriptions = {
      "buchrücken": "Berechne die genaue Stärke deines Buchrückens basierend auf Papiergrammatur und Seitenzahl.",
      "feedbackrunden": "Strukturiere und plane Feedbackrunden für deine Designentwürfe.",
      "fliesen-scan": "Digitalisiere und analysiere Fliesen-Muster in deiner Umgebung.",
      "ausschießer": "Berechne das optimale Ausschieß-Schema für deinen Druckbogen.",
      "anleitungen zum buchbinden": "Detaillierte Schritt-für-Schritt-Anleitungen für verschiedene Buchbinde-Techniken.",
      "skizze zu logo": "Lade Skizzen hoch und verarbeite sie zu ersten Vektorelementen.",
      "mindmap": "Visualisiere deine Gedanken und verknüpfe Konzepte in einem dynamischen Diagramm.",
      "druckereien vergleich": "Vergleiche Preise, Lieferzeiten und Angebote verschiedener Druckdienstleister.",
      "ideensammler": "Hier werden spontane Einfälle, Wörter und Farbcodes strukturiert in einem Mindmap-Raster gesammelt.",
      "workload-planer": "Visualisiere die Aufteilung deiner persönlichen Arbeitsschritte nach Prozentanteilen als minimalistischen Stack.",
      "projekt-planer": "Erstelle Zeitpläne und Meilensteine für deine gestalterischen Projekte.",
      "colab drucker": "Anleitungen zur Druckerinstallation auf dem Mac und Links zu den Treibern für die Colab-Drucker.",
      "font testsheet": "Generiere Testbögen für verschiedene Schriftarten, um Kontraste und Lesbarkeit zu prüfen.",
      "präsi timer": "Ein Timer für Präsentationen, der dir hilft, deine Vortragszeit einzuhalten.",
      "farb-combos": "Erkunde und teste harmonische Farbkombinationen für deine Entwürfe.",
      "farbkontraste": "Berechne den Kontrastwert (WCAG) zwischen Vorder- und Hintergrundfarben.",
      "eigenes tool hinzufügen": "Erweitere das Karussell um deine eigenen Lesezeichen und Web-Tools (In Kürze verfügbar)."
    };

    function updateDescription(block) {
      const descContainer = document.getElementById('block-description');

      // Blende Beschreibung aus, wenn sich das Karussell zu schnell dreht
      if (Math.abs(velocity) > 0.002) {
        descContainer.classList.remove('visible');
        return;
      }

      if (!block) return;

      const blockText = block.textContent.replace(/\s+/g, ' ').trim().toLowerCase();
      const descText = descriptions[blockText] || "";

      if (descContainer.textContent !== descText) {
        descContainer.classList.remove('visible');

        // Warte auf Fade-out vor dem Anzeigen des neuen Texts
        setTimeout(() => {
          if (Math.abs(velocity) <= 0.002) {
            descContainer.textContent = descText;
            if (descText !== "") {
              descContainer.classList.add('visible');
            }
          }
        }, 300);
      } else if (descText !== "" && !descContainer.classList.contains('visible')) {
        descContainer.classList.add('visible');
      }
    }

    function updateRing(checkHighlight = false) {
      let frontBlock = null;
      let maxZ = -1;

      // Berechne den Versatz, damit die vorderste Karte (bei Math.PI/2) exakt mittig bei X=0 liegt
      const offsetX = -radiusY * Math.sin(tiltAngle);

      blocks.forEach((block, index) => {
        const baseAngle = (index / totalBlocks) * Math.PI * 2;
        const angle = baseAngle + currentAngle;

        const originalX = Math.cos(angle) * radiusX;
        const originalY = Math.sin(angle) * radiusY;

        const rotatedX = originalX * Math.cos(tiltAngle) - originalY * Math.sin(tiltAngle);
        const rotatedY = originalX * Math.sin(tiltAngle) + originalY * Math.cos(tiltAngle);

        const depthFactor = (Math.sin(angle) + 1) / 2;

        // Basis-Skalierung leicht angepasst für die neuen CSS-Maße
        const scale = 0.7 + depthFactor * 0.5;
        const opacity = 0.4 + depthFactor * 0.6;
        const zIndex = Math.round(depthFactor * 100);

        // Zentriere die Position durch Abzug des offsetX
        block.style.transform = `translate(-50%, -50%) translate3d(${rotatedX - offsetX}px, ${rotatedY}px, 0) scale(${scale})`;
        block.style.zIndex = zIndex;
        block.style.opacity = opacity;

        // Highlight-Klasse entfernen
        block.classList.remove('is-front');

        if (zIndex > maxZ) {
          maxZ = zIndex;
          frontBlock = block;
        }
      });

      // Nur highlighten, wenn wir (fast) eingerastet sind
      if (checkHighlight && frontBlock) {
        frontBlock.classList.add('is-front');

        // Die vorderste Karte minimal zusätzlich skalieren (z.B. um den Faktor 1.1)
        const currentTransform = frontBlock.style.transform;
        const enhancedScale = currentTransform.replace(/scale\((.+)\)/, (match, p1) => `scale(${parseFloat(p1) * 1.1})`);
        frontBlock.style.transform = enhancedScale;

        // Beschreibung aktualisieren
        updateDescription(frontBlock);
      }
    }

    let velocity = 0;
    let isDragging = false;
    const baseSpeed = 0.001; // konstante langsame Drehgeschwindigkeit
    let autoRotationDirection = 1; // 1 = vorwärts (rechts), -1 = rückwärts (links)

    function animate() {
      if (isDragging) {
        // Während des Touchens übernimmt touchmove das Bewegen und Zeichnen.
        // Die Physik/Auto-Rotation pausiert, um nicht gegen den Finger zu arbeiten.
      } else if (isSnapping) {
        const diff = targetAngle - currentAngle;
        if (Math.abs(diff) > 0.001) {
          currentAngle += diff * 0.1; // Ease-Faktor fürs Einrasten
          updateRing(false);
        } else {
          currentAngle = targetAngle;
          updateRing(true);
          isSnapping = false;
        }
      } else {
        // Auto-Rotation + Abklingen der Scroll-Geschwindigkeit
        if (Math.abs(velocity) > 0.0001) {
          currentAngle += velocity;
          if (velocity !== 0) {
            autoRotationDirection = Math.sign(velocity);
          }
          velocity *= 0.96; // Reibungskoeffizient für sanftes Ausgleiten
          updateRing(true);
        } else {
          velocity = 0;
          currentAngle += autoRotationDirection * baseSpeed;
          updateRing(true);
        }
      }
      requestAnimationFrame(animate);
    }

    // --- UNENDLICHES MAUSRAD-SCROLLEN ---
    window.addEventListener('wheel', (e) => {
      // Verhindert das Vor-/Zurückblättern im Browser bei horizontalem Scrollen
      if (Math.abs(e.deltaX) > Math.abs(e.deltaY)) {
        e.preventDefault();
      }
      isSnapping = false; // Tastatur-Einrasten abbrechen
      const delta = Math.abs(e.deltaX) > Math.abs(e.deltaY) ? e.deltaX : e.deltaY;
      velocity += delta * 0.00015;
    }, { passive: false });

    // --- TOUCH-GESTE ---
    let touchStartValY = 0;
    let touchStartValX = 0;
    window.addEventListener('touchstart', (e) => {
      isSnapping = false; // Tastatur-Einrasten abbrechen
      isDragging = true;
      velocity = 0; // Stoppe Ausgleiten beim Anfassen
      touchStartValY = e.touches[0].clientY;
      touchStartValX = e.touches[0].clientX;
    }, { passive: true });

    window.addEventListener('touchmove', (e) => {
      const touchEndValY = e.touches[0].clientY;
      const touchEndValX = e.touches[0].clientX;
      const diffY = touchStartValY - touchEndValY;
      const diffX = touchStartValX - touchEndValX;

      const diff = Math.abs(diffX) > Math.abs(diffY) ? diffX : diffY;

      // Verhindert das Wischen zur Browser-Navigation bei überwiegend horizontaler Bewegung
      if (Math.abs(diffX) > Math.abs(diffY)) {
        e.preventDefault();
      }

      currentAngle += diff * 0.004;
      velocity = diff * 0.004; // Geschwindigkeit basierend auf Wischstrecke

      touchStartValY = touchEndValY;
      touchStartValX = touchEndValX;
      updateRing(true);
    }, { passive: false });

    window.addEventListener('touchend', () => {
      isDragging = false;
    });

    window.addEventListener('touchcancel', () => {
      isDragging = false;
    });

    // --- TASTATUR-STEUERUNG ---
    window.addEventListener('keydown', (e) => {
      const angleStep = (Math.PI * 2) / totalBlocks;

      if (e.key === 'ArrowLeft') {
        velocity = 0;
        isSnapping = true;
        autoRotationDirection = -1;
        const n = Math.round((Math.PI / 2 - currentAngle) / angleStep);
        targetAngle = (Math.PI / 2) - (n * angleStep) - angleStep;
      } else if (e.key === 'ArrowRight') {
        velocity = 0;
        isSnapping = true;
        autoRotationDirection = 1;
        const n = Math.round((Math.PI / 2 - currentAngle) / angleStep);
        targetAngle = (Math.PI / 2) - (n * angleStep) + angleStep;
      } else if (e.key === 'Enter') {
        let selectedBlock = null;
        let maxZ = -1;

        blocks.forEach(block => {
          const z = parseInt(block.style.zIndex) || 0;
          if (z > maxZ) {
            maxZ = z;
            selectedBlock = block;
          }
        });

        if (selectedBlock && selectedBlock.href) {
          sessionStorage.setItem('carouselAngle', currentAngle);
          window.location.href = selectedBlock.href;
        }
      }
    });

    // Custom click handler using pointer events to prevent browser click suppression on moving elements
    blocks.forEach(block => {
      let startX = 0;
      let startY = 0;
      let startTime = 0;

      block.addEventListener('pointerdown', (e) => {
        // Only left click or touch
        if (e.button !== undefined && e.button !== 0) return;
        startX = e.clientX;
        startY = e.clientY;
        startTime = Date.now();
      });

      block.addEventListener('pointerup', (e) => {
        if (e.button !== undefined && e.button !== 0) return;
        const diffX = e.clientX - startX;
        const diffY = e.clientY - startY;
        const dist = Math.sqrt(diffX * diffX + diffY * diffY);
        const duration = Date.now() - startTime;

        // If mouse/finger barely moved and it was a quick tap/click
        if (dist < 8 && duration < 300) {
          e.preventDefault();
          if (block.href) {
            sessionStorage.setItem('carouselAngle', currentAngle);
            window.location.href = block.href;
          }
        }
      });

      // Prevent default native click which might be suppressed by browser
      block.addEventListener('click', (e) => {
        e.preventDefault();
      });
    });

    // Dynamische Anpassung bei Fenster-Resizing
    window.addEventListener('resize', () => {
      radiusX = window.innerWidth * 0.38;
      radiusY = window.innerHeight * 0.13;
      updateRing();
    });

    // Initialisierung und Start der Animationsschleife
    updateRing(true);
    animate();
  </script>
